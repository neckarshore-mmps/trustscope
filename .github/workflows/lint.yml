# Strict ESLint gate — fails on any warning OR error.
# Mirrors the neckarshore.ai estate CI template (#270 §3): catch drift before
# it reaches main. One of the three test/lint gates TrustScope was missing.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token — this workflow only reads the repo.
permissions:
  contents: read

jobs:
  lint:
    name: ESLint (strict, zero warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with strict gate
        run: npm run lint -- --max-warnings 0
