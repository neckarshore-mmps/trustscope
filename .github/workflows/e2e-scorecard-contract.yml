# Nightly E2E contract test — guards the Scorecard recovery path (issue #12).
# Runs the PINNED scorecard binary against a fixed repo with a classic PAT and a fine-grained PAT,
# asserting scorecard still emits full JSON on stdout even when it exits non-zero (the contract
# lib/adapters/scorecard-adapter.ts::execScorecard relies on). Not a per-PR gate: ~1 min, needs
# secrets, and it verifies an EXTERNAL tool's behavior, not our code.
#
# Skips cleanly when the two secrets are absent (script self-skips), so it never reds a fork.
# Secret setup: see docs/e2e-contract-test.md.
name: E2E Scorecard Contract (nightly)

on:
  schedule:
    - cron: "17 3 * * *" # 03:17 UTC nightly (off-peak, avoids the top-of-hour stampede)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  contract:
    name: Scorecard recovery contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch the pinned scorecard binary
        run: npm run fetch:scorecard

      - name: Run the Scorecard recovery contract test
        env:
          E2E_CLASSIC_PAT: ${{ secrets.E2E_CLASSIC_PAT }}
          E2E_FINEGRAINED_PAT: ${{ secrets.E2E_FINEGRAINED_PAT }}
        run: bash scripts/e2e-scorecard-contract.sh
