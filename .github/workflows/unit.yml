# Unit-test gate — runs the Vitest suite (report-core, adapters, store,
# issue-markdown). The pure report-core (AP-1 anchor) and the swappable
# adapters must stay green on every PR. Mirrors the neckarshore.ai estate CI
# template (#270 §3); one of the three test/lint gates TrustScope was missing.
name: Unit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token — this workflow only reads the repo.
permissions:
  contents: read

jobs:
  unit:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
