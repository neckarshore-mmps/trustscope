# E2E gate — runs the Playwright suite (e2e/) on every PR. Until now 15 specs existed but NO
# workflow ran them, so the browser-level suite never gated (Lane-B Run-1 High #6). This closes that
# third tooth of the test gap: legal pages, site chrome, report page, repo selection, FAQ, personas —
# all now block merge if a rendered page or a footer link regresses.
#
# The suite is offline + token-free: global-setup seeds a deterministic fixture report into the
# FileReportStore and the specs serve it from cache (no GITHUB token, no live scorecard run). The
# webServer block starts `npm run dev` fresh in CI (reuseExistingServer is false under CI).
#
# This workflow ALSO hosts the estate stats.json producer (test-scope facet, backlog #394). The
# emit-stats job (push:main only) counts the two CI-GATED suites — vitest unit (unit.yml) + this
# Playwright e2e — and publishes a contract-conformant stats.json to the UNPROTECTED `stats-data`
# branch (NOT main). main is a public, security-hardened, protected branch (enforce_admins +
# required CodeQL check); a bot push to main is correctly rejected. Publishing to stats-data keeps
# main's protection 100% intact — no bypass actor, no weakened gate. The neckarshore-website
# aggregator fetches this repo's stats.json with `?ref=stats-data` (statsRef in stats-config.json).
# It lives HERE (not a standalone workflow) because e2e is the heaviest gate: needs:e2e hands the
# emit job this suite's real result for free, so `red` reflects an actual e2e failure without a
# second full-browser run.
# Contract: https://github.com/neckarshore-ai/neckarshore-planning/blob/main/docs/reference/stats-json-contract.md
name: E2E

on:
  push:
    branches: [main]
    # Defensive no-op since the emit now targets the `stats-data` branch (a push to stats-data
    # never matches this main-only trigger, so the re-emit loop is structurally impossible). Kept
    # so that even a hypothetical manual stats.json commit on main cannot self-trigger a re-emit.
    paths-ignore:
      - 'stats.json'
  pull_request:
    branches: [main]

# Least-privilege default token — the e2e job only reads the repo. emit-stats re-grants
# contents:write for its job only (job-scoped, never workflow-wide).
permissions:
  contents: read

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: npm run test:e2e

  # Estate stats.json producer (test-scope facet, backlog #394), SPLIT across two jobs for
  # least-privilege (T-TS-STATS-EMIT-SCOPED-AUTH / #91, CodeRabbit Major on #90):
  #
  #   generate-stats  (contents: READ)  — runs `npm ci` + the third-party test-stats-action to
  #                                       produce a contract-conformant stats.json, uploaded as an
  #                                       artifact. Even though a third-party action can pull
  #                                       github.token via its own action.yml default, the token it
  #                                       gets here is READ-scoped and cannot push anywhere.
  #   publish-stats   (contents: WRITE) — downloads that artifact and pushes it to the UNPROTECTED
  #                                       stats-data branch. Runs NO `npm ci` and NO third-party
  #                                       `uses:` — nothing but first-party checkout/download +
  #                                       git plumbing ever executes while the write token is in scope.
  #
  # Why the split, not just persist-credentials:false: the #90 Major named TWO vectors — npm-ci
  # lifecycle scripts AND the third-party test-stats-action. persist-credentials:false closes only
  # the first (token out of .git/config). A third-party action still reaches a job-scoped
  # github.token via its manifest default (GitHub: "an action can access the GITHUB_TOKEN through
  # the github.token context even if the workflow does not explicitly pass it"). Separating the
  # write permission onto a job that runs no untrusted code closes the second vector structurally.
  #
  # Publishes on every push:main, AFTER the e2e gate. Runs even when e2e fails (if: always) so a
  # non-green run emits red:true — never a stale-green count. Publishing to stats-data (not main)
  # keeps main's branch protection fully intact — no bypass actor, no weakened required check.
  #
  # Counts come from each runner's OWN reporter (never grep):
  #   unit → vitest --reporter=json .numPassedTests (this job re-runs the cheap suite)
  #   e2e  → playwright --list "Total: N tests" (enumeration of the suite the e2e job GATES)
  # Both are executed AND CI-gated AND DISJOINT (vitest = lib/app/config, playwright = e2e/),
  # so both sum into tests.total. The nightly e2e-scorecard-contract is NOT push/PR-gated (needs
  # secrets, self-skips) → deliberately NOT counted. `red` = (unit failed OR e2e failed).
  generate-stats:
    name: Generate stats.json (estate producer)
    needs: e2e
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      # persist-credentials:false — belt for the read job too: keep even the read-scoped token out
      # of .git/config so npm-ci lifecycle scripts can't read it. The real defence is that this job
      # has ONLY contents:read; the WRITE token lives exclusively on publish-stats below.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Re-run the unit suite here to capture BOTH its count and its own pass/fail outcome.
      # continue-on-error: a red vitest run still writes the JSON report (numPassedTests reflects
      # passes) and is flagged red below — never fails this job silently. No browser needed.
      - name: Capture unit reporter (vitest)
        id: unit
        continue-on-error: true
        run: npx vitest run --reporter=json --outputFile=/tmp/vitest.out

      # Enumerate the e2e suite for its count. `--list` collects only (no server, no browser,
      # no globalSetup) — it prints the authoritative "Total: N tests in M files" the action
      # parses. The e2e EXECUTION result comes from needs.e2e.result (the gate job above), so
      # this enumeration never has to re-run the full browser suite.
      - name: Capture e2e reporter (playwright --list)
        run: npx playwright test --list > /tmp/e2e-list.out 2>&1 || true

      # Combine the two gated suites into one honest test_result: green only if BOTH passed.
      # Values are job outcomes (success/failure/…), never untrusted event text — no injection.
      - name: Compute combined test result
        id: result
        env:
          UNIT_OUTCOME: ${{ steps.unit.outcome }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [ "$UNIT_OUTCOME" = "success" ] && [ "$E2E_RESULT" = "success" ]; then
            echo "value=success" >> "$GITHUB_OUTPUT"
            echo "detail=" >> "$GITHUB_OUTPUT"
          else
            detail=""
            [ "$UNIT_OUTCOME" != "success" ] && detail="unit suite: $UNIT_OUTCOME"
            [ "$E2E_RESULT" != "success" ] && detail="${detail:+$detail; }e2e suite: $E2E_RESULT"
            echo "value=failure" >> "$GITHUB_OUTPUT"
            echo "detail=$detail" >> "$GITHUB_OUTPUT"
          fi

      # Pinned to the full commit SHA of test-stats-action (third-party actions are SHA-pinned,
      # never tag-floated). 54ae407 is the PIR-passed pin (fixes the 7a53ad0d manifest-load bug
      # that broke producer #1's first real emit). Supports declared/red/red_detail + vitest &
      # playwright runners. declared is left empty: no executed-but-ungated suite is counted.
      # Runs under contents:read — even if this third-party action pulls github.token via its own
      # manifest default, the token is read-scoped and cannot push (the whole point of the split).
      - name: Emit stats.json
        uses: neckarshore-ai/test-stats-action@54ae407769bdfea6b8fed2672f0ceefa5ef2588a
        with:
          repo: ${{ github.repository }}
          out: stats.json
          sha: ${{ github.sha }}
          test_result: ${{ steps.result.outputs.value }}
          red_detail: ${{ steps.result.outputs.detail }}
          runners: |
            unit:vitest:/tmp/vitest.out
            e2e:playwright:/tmp/e2e-list.out

      # Structural contract gate — invariants that hold on BOTH green and red runs. Deliberately
      # does NOT assert a golden total (a red run legitimately undercounts and must still emit
      # red:true, so a hard-coded number here would block the honest red emit). Fail-fast BEFORE
      # the artifact upload, so publish-stats can never receive a malformed stats.json.
      - name: Validate emitted stats.json against the contract
        run: |
          jq -e --arg repo "$GITHUB_REPOSITORY" '
            .repo == $repo
            and (.audited_sha | type == "string" and length > 0)
            and (.tests.total == ([.tests.byType[]] | add))
            and (.tests.byType | has("unit") and has("e2e"))
            and (.tests.declared == {})
            and (.red | type == "boolean")
          ' stats.json > /dev/null \
            || { echo "::error::stats.json failed contract validation"; cat stats.json; exit 1; }
          echo "stats.json is contract-valid:"; cat stats.json

      # Hand the validated stats.json to publish-stats (the ONLY contents:write job). This artifact
      # is the sole channel between the jobs — publish-stats rebuilds nothing, it just pushes this
      # exact file. retention-days:1 — this is transient CI plumbing, not an archive.
      - name: Upload stats.json artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stats-json
          path: stats.json
          retention-days: 1
          if-no-files-found: error

  # Publish job — the ONLY contents:write job, and it runs NO `npm ci` and NO third-party `uses:`.
  # It downloads the validated stats.json and pushes it to the UNPROTECTED stats-data branch. No
  # untrusted code executes while the write token is in scope — that is the whole point of the
  # split (#91). Gated on generate-stats succeeding: a contract-validation failure there fails that
  # job → needs.generate-stats.result != 'success' → this job is skipped, so a malformed stats.json
  # is never published.
  publish-stats:
    name: Publish stats.json (stats-data branch)
    needs: generate-stats
    if: always() && needs.generate-stats.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      # Serialize the PUSH (the thing that can race on stats-data), not the generation above.
      group: publish-stats-${{ github.ref }}
      cancel-in-progress: false

    steps:
      # persist-credentials:false — keep the write token out of .git/config; auth is re-granted
      # ONLY on the final `git push` via http.extraheader below. The interim reads (git fetch/show
      # of origin/stats-data) are anonymous over https — trustscope is PUBLIC, so read needs no
      # credential; only the push does.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Bring in the validated stats.json produced by generate-stats. No `path:` → lands in the
      # working tree root (cwd), exactly where the plumbing below reads `stats.json` from.
      - name: Download stats.json artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stats-json

      # Publish the stats.json to the UNPROTECTED `stats-data` branch (never main — main's
      # protection stays 100% intact). stats-data is a dedicated single-file data branch: it carries
      # ONLY stats.json, isolated from main's code history.
      #
      # Built with git PLUMBING (hash-object → mktree → commit-tree → push), NOT a working-tree
      # branch switch. A `git checkout` to stats-data would abort: stats-data shares no history with
      # main, so git treats every main file as "would be overwritten" and refuses. Plumbing never
      # touches the working tree or switches branches — it writes one blob + one tree + one commit
      # to the object DB and pushes the ref. The tree is exactly {stats.json}; the commit chains
      # onto the previous stats-data tip (history preserved) or starts a fresh root (first run).
      #
      # Diff-guard on the meaningful fields only (everything EXCEPT the always-changing updatedAt):
      # a new push has a new audited_sha → publish (keeps the number fresh); a re-run on the same
      # sha differs only by timestamp → no churn commit. The concurrency group serializes the push.
      - name: Publish stats.json to the stats-data branch when it changed
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
          # Scoped write auth (#91): consumed ONLY on the final `git push` via http.extraheader.
          # github.token is this job's contents:write GITHUB_TOKEN.
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          norm() { jq -S 'del(.updatedAt)' "$1" 2>/dev/null; }
          # Reliably materialize refs/remotes/origin/stats-data (a bare `fetch <branch>` only sets
          # FETCH_HEAD). Fails harmlessly on the first run (the branch does not exist yet).
          git fetch origin +refs/heads/stats-data:refs/remotes/origin/stats-data 2>/dev/null || true
          if git show origin/stats-data:stats.json > /tmp/prev-stats.json 2>/dev/null \
             && [ "$(norm /tmp/prev-stats.json)" = "$(norm stats.json)" ]; then
            echo "stats.json unchanged (ignoring timestamp) — nothing to publish."
            exit 0
          fi
          BLOB=$(git hash-object -w stats.json)
          TREE=$(printf '100644 blob %s\tstats.json\n' "$BLOB" | git mktree)
          MSG="chore(stats): emit stats.json @ ${GITHUB_SHA:0:7}"
          if git rev-parse --verify origin/stats-data >/dev/null 2>&1; then
            COMMIT=$(git commit-tree "$TREE" -p origin/stats-data -m "$MSG")
          else
            COMMIT=$(git commit-tree "$TREE" -m "$MSG")
          fi
          # Belt: a git push with an EMPTY source refspec (":refs/heads/stats-data") is a DELETE
          # command — an empty $COMMIT would delete stats-data instead of updating it. `set -e`
          # already aborts on a failed commit-tree substitution; this is the explicit guard so a
          # branch deletion can never depend on implicit -e (data-integrity belt on the trust product).
          [ -n "$COMMIT" ] || { echo "::error::commit-tree produced no commit — refusing to push (would delete stats-data)"; exit 1; }
          # Scoped push auth (#91): persist-credentials:false kept the write token out of .git/config,
          # so auth is supplied inline for THIS push only. http.extraheader (the actions/checkout-
          # canonical pattern) — NOT a token-in-URL, which can leak into git's error output.
          # `base64 | tr -d '\n'` because ubuntu `base64` wraps at 76 columns. printf is a bash
          # builtin (no argv exposure of the token) and this script runs without `set -x`, so the
          # base64 credential is never echoed to the Actions log.
          git -c http.extraheader="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')" \
            push origin "${COMMIT}:refs/heads/stats-data"
