# Dependabot — keeps the SHA-pinned actions and npm deps current.
# #270 estate standard, §3 control 2. Two ecosystems: the npm manifest at the
# repo root and the GitHub Actions pinned in .github/workflows/.
#
# The github-actions updater rewrites the pinned SHAs (and their `# vX`
# comments) to the newest release, so the Pinned-Deps hardening stays fresh
# instead of rotting at today's commit.
version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    ignore:
      # eslint MAJOR is deferred: the Next lint stack (eslint-config-next ->
      # eslint-plugin-react@7.37.5) peer-caps at `eslint@^9.7` and still calls
      # `context.getFilename()`, which ESLint 10 removed — the lint run crashes
      # at rule-load before checking a single line (PR #7, Issue #30). No fixed
      # release exists upstream yet. Re-enable by removing this ignore once
      # eslint-config-next officially supports ESLint 10. Minor/patch still flow.
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      # typescript MAJOR is deferred: the Next lint stack bundles
      # `@typescript-eslint/typescript-estree`, which reads TypeScript internal
      # APIs that the TS 7 native compiler port reshaped — the lint run crashes
      # at parser-load with `TypeError: Cannot read properties of undefined
      # (reading 'Cjs')` before checking a single line (PR #68, Issue #30). Note
      # `tsc --noEmit` itself is GREEN on TS 7 — this is a lint-toolchain lag,
      # NOT a compiler problem. No fixed upstream release of typescript-eslint
      # supports the TS 7 native API yet. Re-enable by removing this ignore once
      # eslint-config-next's bundled typescript-eslint supports TS 7. Minor/patch
      # still flow.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
    groups:
      # Grouping is aligned with the auto-merge safe class (dependabot-auto-merge.yml)
      # so the boring class self-clears atomically and only the review-worthy bumps
      # surface individually:
      #   - npm-development: dev deps, minor+patch  -> auto (minor&&dev, or patch)
      #   - npm-production:  prod deps, patch only   -> auto (patch)
      #   - runtime minor (prod, minor): ungrouped -> individual PR -> MANUAL
      #   - any major:                   ungrouped -> individual PR -> MANUAL
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
    groups:
      # Non-major actions bumps batch into one auto-mergeable PR; an actions MAJOR
      # stays ungrouped so it surfaces individually for review.
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
